<!DOCTYPE html>
<html lang=en>
<head>
<meta charset=UTF-8>
<meta name=viewport content="width=device-width,initial-scale=1.0">
<title>ocgt-monitor</title>
<style>
:root{--bg:#ffffff;--surface:#f8f9fa;--border:#e9ecef;--text:#212529;--sec:#6c757d;--ter:#adb5bd;--accent:#4361ee;--green:#2b9348;--yellow:#b8860b;--blue:#1a73e8;--purple:#7c3aed;--mono:'SF Mono','Fira Code',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;width:300px;overflow:hidden;user-select:none}
.trigger{position:fixed;right:0;top:0;width:6px;height:100vh;z-index:9999;cursor:pointer;background:transparent;transition:background .3s}
.trigger:hover{background:rgba(67,97,238,0.06)}
.panel{display:flex;flex-direction:column;height:100vh;border-left:1px solid var(--border)}
.header{padding:14px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hl{display:flex;align-items:center;gap:8px}
.hicon{width:22px;height:22px;background:var(--accent);border-radius:5px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700}
.hl h1{font-size:13px;font-weight:600}
.hr{display:flex;align-items:center;gap:8px}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 0 2px #eafaf1}
.ht{font-size:10px;color:var(--ter);font-family:var(--mono)}
.c{flex:1;overflow-y:auto;padding:10px 14px;scrollbar-width:thin}
.c::-webkit-scrollbar{width:3px}
.c::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
.se{margin-bottom:14px}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sh span{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--ter)}
.qi{display:flex;align-items:center;gap:8px;padding:6px 0}
.ql{width:50px;font-size:11px;font-weight:500;flex-shrink:0}
.qt{flex:1;height:5px;background:var(--surface);border-radius:3px;overflow:hidden}
.qf{height:100%;border-radius:3px;transition:width .8s}
.qf.g{background:var(--green)}.qf.y{background:var(--yellow)}.qf.b{background:var(--blue)}
.qr{width:40px;text-align:right;font-size:10px;color:var(--ter);font-family:var(--mono);flex-shrink:0}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.sc{background:var(--surface);border-radius:5px;padding:8px;text-align:center}
.sc .nm{font-size:16px;font-weight:700;letter-spacing:-.3px;line-height:1.2}
.sc .nm.g{color:var(--green)}.sc .nm.b{color:var(--blue)}.sc .nm.y{color:var(--yellow)}.sc .nm.p{color:var(--purple)}
.sc .lb{font-size:9px;color:var(--ter);text-transform:uppercase;letter-spacing:.3px;margin-top:2px}
.br{display:flex;align-items:center;justify-content:space-between;padding:5px 0}
.bl{font-size:11px;color:var(--sec)}
.bv{font-size:17px;font-weight:700;font-family:var(--mono);letter-spacing:-.5px}
.bc{font-size:10px;color:var(--ter);font-weight:400}
.bs{font-size:10px;color:var(--ter);display:flex;gap:12px;justify-content:flex-end}
.mi{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)}
.mi:last-child{border-bottom:none}
.md{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.mn{flex:1;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mt{font-size:10px;font-family:var(--mono);color:var(--sec);flex-shrink:0}
.mr{font-size:9px;color:var(--ter);flex-shrink:0;width:26px;text-align:right}
.emp{text-align:center;padding:20px;color:var(--ter);font-size:12px}
.err{color:#dc2626;font-size:11px;padding:8px;text-align:center;background:#fef2f2;border-radius:5px}
</style>
</head>
<body>
<div class=trigger id=trigger title=展开></div>
<div class=panel>
<div class=header>
<div class=hl><div class=hicon>OG</div><h1>ocgt-monitor</h1></div>
<div class=hr><span class=sdot id=sdot></span><span class=ht id=ht>--:--</span></div>
</div>
<div class=c>
<div class=se id=quotaSec><div class=sh><span>Plan Usage</span><span id=refreshInfo></span></div><div class=emp id=quotaLoad>Loading...</div></div>
<div class=se><div class=sh><span>Today</span></div><div class=sg id=todayGrid><div class=sc><div class="nm b" id=tdIn>--</div><div class=lb>Input</div></div><div class=sc><div class="nm y" id=tdOut>--</div><div class=lb>Output</div></div><div class=sc><div class="nm g" id=tdTot>--</div><div class=lb>Total</div></div><div class=sc><div class="nm p" id=tdReq>--</div><div class=lb>Requests</div></div></div></div>
<div class=se id=balanceSec><div class=sh><span>DeepSeek Balance</span></div><div id=balLoad><div class=emp>--</div></div></div>
<div class=se id=modelSec><div class=sh><span>Top Models (7d)</span></div><div id=modelLoad><div class=emp>Loading...</div></div></div>
</div>
</div>
<script>
function n(n){if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return String(n)}
function qs(id,v){document.getElementById(id).textContent=v}
async function fa(){try{await Promise.all([fq(),fb(),fh(),fm()]);document.getElementById('ht').textContent=new Date().toLocaleTimeString()}catch(e){}}
async function fq(){var r=await(await fetch('/api/quota')).json(),e=document.getElementById('quotaLoad');if(!r.success){e.innerHTML='<div class=err>'+r.error+'</div>';return}
var d=r.data;e.innerHTML='<div class=qi><span class=ql style=color:var(--green)>Rolling</span><div class=qt><div class="qf g" style=width:'+d.rolling.usage_percent+'%></div></div><span class=qr>'+d.rolling.reset_display+'</span></div><div class=qi><span class=ql style=color:var(--yellow)>Weekly</span><div class=qt><div class="qf y" style=width:'+d.weekly.usage_percent+'%></div></div><span class=qr>'+d.weekly.reset_display+'</span></div>'+(d.monthly?'<div class=qi><span class=ql style=color:var(--blue)>Monthly</span><div class=qt><div class="qf b" style=width:'+d.monthly.usage_percent+'%></div></div><span class=qr>'+d.monthly.reset_display+'</span></div>':'<div class=qi><span class=ql style=color:var(--blue)>Monthly</span><div style=color:var(--ter);font-size:11px>Unlimited</div></div>')}
async function fb(){var r=await(await fetch('/api/balance')).json(),e=document.getElementById('balLoad');if(!r.success){e.innerHTML='<div class=emp>'+r.error+'</div>';return}
var d=r.data;e.innerHTML='<div class=br><span class=bl>Available</span><span class=bv>'+d.total_balance.toFixed(2)+' <span class=bc>'+d.currency+'</span></span></div>'+(d.granted_balance>0||d.topped_up_balance>0?'<div class=bs><span>'+(d.granted_balance>0?'Granted: '+d.granted_balance.toFixed(2):'')+'</span><span>'+(d.topped_up_balance>0?'Topped up: '+d.topped_up_balance.toFixed(2):'')+'</span></div>':'')}
async function fh(){var r=await(await fetch('/api/history')).json();if(!r.success)return;var d=r.data;if(d&&d.length){var t=d[d.length-1];qs('tdIn',n(t.input_tokens||0));qs('tdOut',n(t.output_tokens||0));qs('tdTot',n(t.total_tokens||0));qs('tdReq',t.request_count||0)}}
async function fm(){var r=await(await fetch('/api/models')).json(),e=document.getElementById('modelLoad');if(!r.success||!r.data||!r.data.length){e.innerHTML='<div class=emp>No data</div>';return}
var colors=['#4361ee','#7c3aed','#2b9348','#b8860b','#1a73e8','#dc2626','#e67e22'];var h='';r.data.forEach(function(m,i){h+='<div class=mi><span class=md style=background:'+colors[i%colors.length]+'></span><span class=mn title="'+m.model+'">'+m.model+'</span><span class=mt>'+n(m.total_tokens||0)+'</span><span class=mr>'+m.request_count+'</span></div>'});e.innerHTML=h}
fa();setInterval(fa,60000)
</script>
</body>
</html>
